<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng Sinh Hoạt</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#f1f5f9;
  padding:20px;
  color:#1e293b;
}

.container{
  max-width:1200px;
  margin:auto;
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

/* HEADER */

.title{
  text-align:center;
  font-size:34px;
  font-weight:bold;
  color:#2563eb;
  margin-bottom:25px;
}

/* INFO */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

.section{
  background:#f8fafc;
  border:1px solid #ddd;
  border-radius:15px;
  padding:15px;
}

.section h3{
  margin-bottom:12px;
  color:#2563eb;
}

input,
textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

textarea{
  resize:vertical;
}

/* ICON */

.icon-list{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.icon{
  width:50px;
  height:50px;
  border-radius:12px;
  border:2px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  background:white;
}

.icon.active{
  background:#dcfce7;
  border-color:#22c55e;
}

/* TABLE */

.table-wrapper{
  overflow:auto;
}

.routine-table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

.routine-table th,
.routine-table td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

.routine-table th{
  background:#eff6ff;
  color:#2563eb;
}

.routine-table input[type=text]{
  border:none;
  background:transparent;
  width:100%;
  padding:5px;
}

.routine-table input[type=checkbox]{
  width:20px;
  height:20px;
}

/* BUTTONS */

.top-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.btn{
  border:none;
  padding:10px 15px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.add-btn{
  background:#3b82f6;
}

.delete-btn{
  background:#ef4444;
  padding:6px 10px;
}

.print-btn{
  background:#22c55e;
}

.footer{
  display:flex;
  justify-content:flex-end;
  margin-top:25px;
}

/* PRINT */

@media print{

body{
  background:white;
  padding:0;
}

.btn{
  display:none;
}

.container{
  box-shadow:none;
  border:none;
}

}

/* MOBILE */

@media(max-width:900px){

.grid{
  grid-template-columns:1fr;
}

.title{
  font-size:26px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
🌟 BẢNG LỊCH SINH HOẠT 🌟
</div>

<!-- INFO -->

<div class="grid">

<div class="section">

<h3>🧒 Tên của bé</h3>

<input
type="text"
value="CHIMAY"
/>

</div>

<div class="section">

<h3>🦆 Chọn icon</h3>

<div class="icon-list">

<div class="icon active">🦆</div>
<div class="icon">🐱</div>
<div class="icon">🐻</div>
<div class="icon">🐶</div>
<div class="icon">⚡</div>
<div class="icon">🌟</div>

</div>

</div>

</div>

<!-- NOTE -->

<div class="grid">

<div class="section">

<h3>🎁 Cửa hàng đổi quà</h3>

<textarea rows="4">
10 sao = Xem TV 30 phút
30 sao = Đi ăn gà rán
</textarea>

</div>

<div class="section">

<h3>⚠️ Góc nhắc nhở</h3>

<textarea rows="4">
Làm không gọn gàng → làm lại
Cãi lời → trừ 2 sao
</textarea>

</div>

</div>

<!-- TABLE -->

<div class="section">

<div class="top-actions">

<h3>☑️ Danh sách việc cần làm</h3>

<button
class="btn add-btn"
onclick="addTask()"
>
+ Thêm việc
</button>

</div>

<div class="table-wrapper">

<table class="routine-table">

<thead>

<tr>

<th>Việc cần làm</th>
<th>T2</th>
<th>T3</th>
<th>T4</th>
<th>T5</th>
<th>T6</th>
<th>T7</th>
<th>Xóa</th>

</tr>

</thead>

<tbody id="taskTable"></tbody>

</table>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<button
class="btn print-btn"
onclick="window.print()"
>
🖨️ In A4
</button>

</div>

</div>

<script>

/* DATA */

let tasks = JSON.parse(
localStorage.getItem("routineTasks")
) || [

"Đánh răng",
"Ăn sáng",
"Học bài"

];

/* RENDER */

function render(){

let table =
document.getElementById("taskTable");

table.innerHTML = "";

tasks.forEach((task,index)=>{

let tr = document.createElement("tr");

/* TASK NAME */

let nameTd = document.createElement("td");

let input = document.createElement("input");

input.type = "text";

input.value = task;

input.oninput = (e)=>{

tasks[index] = e.target.value;

save();

};

nameTd.appendChild(input);

tr.appendChild(nameTd);

/* DAYS */

for(let i=0;i<6;i++){

let td = document.createElement("td");

let check =
document.createElement("input");

check.type = "checkbox";

td.appendChild(check);

tr.appendChild(td);

}

/* DELETE */

let delTd =
document.createElement("td");

let delBtn =
document.createElement("button");

delBtn.innerText = "❌";

delBtn.className = "btn delete-btn";

delBtn.onclick = ()=>{

tasks.splice(index,1);

save();

render();

};

delTd.appendChild(delBtn);

tr.appendChild(delTd);

table.appendChild(tr);

});

}

/* ADD */

function addTask(){

tasks.push("");

save();

render();

}

/* SAVE */

function save(){

localStorage.setItem(
"routineTasks",
JSON.stringify(tasks)
);

}

/* ICON SELECT */

document.querySelectorAll(".icon")
.forEach(icon=>{

icon.onclick = ()=>{

document.querySelectorAll(".icon")
.forEach(i=>i.classList.remove("active"));

icon.classList.add("active");

};

});

render();

</script>

</body>
</html>
